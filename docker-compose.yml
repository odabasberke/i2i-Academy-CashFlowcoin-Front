# CryptoPal - core infrastructure (PostgreSQL + Redis-protocol cache)
#
# Usage:
#   cp .env.example .env   # then fill in real values
#   docker compose up -d
#
# No "version:" key on purpose - it's obsolete in current Compose Specification
# and only produces a warning in modern Docker Compose (v2).

services:
  postgres:
    image: postgres:18.4-alpine
    container_name: cryptopal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # postgres image only executes files in docker-entrypoint-initdb.d
      # on first init, i.e. when the data volume is empty. To re-apply
      # schema changes during development: docker compose down -v
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cryptopal-network

  redis:
    # Redis per project requirements doc (Bolum 5.4).
    image: redis:7-alpine
    container_name: cryptopal-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cryptopal-network

networks:
  cryptopal-network:
    name: cryptopal-network

volumes:
  postgres_data:
    name: cryptopal-postgres-data
  redis_data:
    name: cryptopal-redis-data
