spring:
  application:
    name: cryptopal-backend

  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Schema is owned by db/init.sql, not by Hibernate auto-generation.
      # "validate" fails fast on startup if entities and DB schema drift.
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD}

  mvc:
    async:
      # Outer safety net on top of GeminiClient's own connect/read timeouts -
      # if the whole async round trip somehow runs long anyway, Spring MVC
      # times out the HTTP response instead of hanging indefinitely.
      request-timeout: 15000

server:
  port: ${SERVER_PORT:8080}

cryptopal:
  jwt:
    secret: ${JWT_SECRET}
  ai:
    gemini:
      api-key: ${GEMINI_API_KEY}
      model: ${GEMINI_MODEL:gemini-3.5-flash}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.cryptopal: INFO
    org:
      springframework:
                  security=DEBUG:
